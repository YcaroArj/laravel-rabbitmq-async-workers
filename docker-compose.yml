version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-broker
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT}:${RABBITMQ_PORT}"   
      - "${RABBITMQ_PORT_MANAGER}:${RABBITMQ_PORT_MANAGER}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    networks:
      - laravel-rabbitmq-async-workers
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  redis:
    image: redis:alpine
    container_name: laravel-rabbitmq-async-workers-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    networks:
      - laravel-rabbitmq-async-workers
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: laravel-rabbitmq-async-workers-db
    restart: unless-stopped
    ports:
      - "${DB_PORT}:${DB_PORT}"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel-rabbitmq-async-workers
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-rabbitmq-async-workers-app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - .:/var/www
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${APP_PORT}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - laravel-rabbitmq-async-workers

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-rabbitmq-queue-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "php artisan rabbitmq:queue-declare payment.pix && php artisan rabbitmq:queue-declare payment.boleto && php artisan rabbitmq:queue-declare payment.credit_card && supervisord -n -c /etc/supervisor/supervisord.conf"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - laravel-rabbitmq-async-workers

networks:
  laravel-rabbitmq-async-workers:
    driver: bridge

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data: